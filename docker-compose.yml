services:
  app:
    image: money-dashboard:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: money
    restart: unless-stopped
    volumes:
      # données financières live (régénérées par les crons refresh.sh sur l'hôte)
      - ./data:/srv/data:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.money.rule=Host(`money.luku.fr`)"
      - "traefik.http.routers.money.entrypoints=websecure"
      - "traefik.http.routers.money.middlewares=compress@file,deny-trace@file"
      - "traefik.http.routers.money.tls=true"
      - "traefik.http.routers.money.tls.certresolver=lets-encrypt"
      - "traefik.http.routers.money-http.rule=Host(`money.luku.fr`)"
      - "traefik.http.routers.money-http.entrypoints=web"
      - "traefik.http.routers.money-http.middlewares=money-https"
      - "traefik.http.middlewares.money-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.money-https.redirectscheme.permanent=true"
      - "traefik.http.services.money.loadbalancer.server.port=80"

networks:
  web:
    external: true
