server {
    listen 80;
    server_name money.luku.fr;
    root /usr/share/nginx/html;
    index index.html;

    # Empêche toute écriture / méthode non-lecture : dashboard 100% read-only
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # données live : jamais mises en cache pour refléter les mises à jour immédiatement
    location ~ ^/(data|intraday|daily|news|benchmarks|recap)\.json$ {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # HTML/CSS/JS : revalidation à chaque visite (304 si inchangé) — sinon le
    # navigateur garde les vieilles versions en cache heuristique après un déploiement
    location ~* \.(?:html|css|js)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
