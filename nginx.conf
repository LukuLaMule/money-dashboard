server {
    listen 80;
    server_name money.luku.fr;
    root /usr/share/nginx/html;
    index index.html;

    # Empêche toute écriture / méthode non-lecture : dashboard 100% read-only
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # data.json : jamais mis en cache pour refléter tes mises à jour immédiatement
    location = /data.json {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
